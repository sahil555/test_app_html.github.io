<!DOCTYPE html>
<html>
<head>
<title>Simple Click Game</title>
<style>
body {
    font-family: Arial;
    text-align: center;
}

#gameArea {
    width: 400px;
    height: 400px;
    border: 2px solid black;
    margin: 20px auto;
    position: relative;
}

#box {
    width: 50px;
    height: 50px;
    background: red;
    position: absolute;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>Click the Box Game</h2>
<p>Score: <span id="score">0</span></p>

<div id="gameArea">
    <div id="box"></div>
</div>

<script>
let score = 0;
let box = document.getElementById("box");
let area = document.getElementById("gameArea");

function moveBox() {
    let x = Math.random() * (area.clientWidth - 50);
    let y = Math.random() * (area.clientHeight - 50);

    box.style.left = x + "px";
    box.style.top = y + "px";
}

box.onclick = function() {
    score++;
    document.getElementById("score").innerText = score;
    moveBox();
};

moveBox();
</script>

</body>
</html>
